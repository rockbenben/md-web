name: Publish to ClawHub

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "SKILL.md"
      - "upload.js"
      - "docsify-server/**"
      - "config.example.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Authenticate
        run: |
          mkdir -p /tmp/clawhub
          printf '{"registry":"https://clawhub.ai","token":"%s"}' "$CLAWHUB_TOKEN" > /tmp/clawhub/config.json
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish skill
        run: clawhub publish .
        env:
          CLAWHUB_CONFIG_PATH: /tmp/clawhub/config.json
